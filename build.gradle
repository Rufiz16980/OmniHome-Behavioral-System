plugins {
  id 'java'
  id 'application'
}

group = 'com.omnihome'
version = '2.0.0'

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(17)
  }
}

repositories {
  mavenCentral()
}

dependencies {
  testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
}

test {
  useJUnitPlatform()
}

application {
  mainClass = 'com.omnihome.Main'
}
